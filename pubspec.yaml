name: flutter_cef
description: "Embed a Chromium (CEF) browser as a Flutter Texture on macOS: composites and clips like a widget, with input forwarding, a JS bridge, and navigation events."
version: 0.2.0
homepage: https://github.com/FlutterFlow/flutter_cef
repository: https://github.com/FlutterFlow/flutter_cef
issue_tracker: https://github.com/FlutterFlow/flutter_cef/issues
topics:
  - webview
  - chromium
  - cef
  - browser

environment:
  sdk: ^3.4.0
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  # Federation members are wired as path deps: the repo is consumed from source
  # (path / git), not pub.dev. PUBLISHING (when it happens): `pub publish`
  # rejects path deps, so publish bottom-up — flutter_cef_platform_interface,
  # then flutter_cef_macos, then this package — and at each step swap the sibling
  # `path:` deps for hosted caret constraints (`^0.1.x`, the
  # minor-compatible policy noted in the platform_interface pubspec), keeping the
  # `path:` entries under `dependency_overrides` for local dev.
  flutter_cef_platform_interface:
    path: packages/flutter_cef_platform_interface
  # Endorsed default macOS implementation (see `default_package` below). Depended
  # on directly so a plain dependency on `flutter_cef` provides macOS support.
  flutter_cef_macos:
    path: packages/flutter_cef_macos

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' specifies the class (in Java, Kotlin, Swift, Objective-C, etc.)
  # which should be registered in the plugin registry. This is required for
  # using method channels.
  # The Android 'package' specifies package in which the registered class is.
  # This is required for using method channels on Android.
  # The 'ffiPlugin' specifies that native code should be built and bundled.
  # This is required for using `dart:ffi`.
  # All these are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      macos:
        # Federated: the macOS implementation lives in the endorsed
        # flutter_cef_macos package (see packages/flutter_cef_macos).
        default_package: flutter_cef_macos

  # To add assets to your plugin package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
